services:
  web:
    image: nginx:alpine
    ports:
      - "${PORT:-80}:80"
    volumes:
      - www_data:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      updater:
        condition: service_healthy

  updater:
    build:
      context: .
      dockerfile: docker/Dockerfile.updater
    volumes:
      - www_data:/var/www/html
    environment:
      - GITHUB_REPO_URL=${GITHUB_REPO_URL:-https://github.com/winoiknow/www-anteon-group}
      - GITHUB_BRANCH=${GITHUB_BRANCH:-main}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-900}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/var/www/html/index.html"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

volumes:
  www_data:
